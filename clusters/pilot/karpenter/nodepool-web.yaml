# Web/system pool — non-GPU workloads. No taint (default schedulable), on-demand,
# no held reservations. Kept separate from the GPU pools so web load never lands
# on scarce GPU capacity.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: web
spec:
  weight: 10
  template:
    metadata:
      labels:
        pool.synorg.io/name: web
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: web
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "1000"
