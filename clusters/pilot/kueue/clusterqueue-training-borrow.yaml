# training-borrow — the ClusterQueue every R&D training job is admitted through
# (KTD6, training-only admission). Its nominal GPU quota is ZERO: training owns no
# GPU outright. It borrows the lendable pool from the gpu-lending cohort up to
# borrowingLimit, which is the aggregate representation of inference demand —
# the git-scheduled lending curve.
#
# CRITICAL design (KTD6): serving is NEVER Kueue-admitted. Inference demand does
# not enter this queue as pods; it enters as the borrowingLimit number below.
# Two reclaim mechanisms protect the render path — note that neither is Kueue
# preempting running training:
#   1. Planned  — U8 shrinks borrowingLimit ahead of the morning ramp. A smaller
#      limit only stops Kueue admitting *new* borrow; it does not evict training
#      already running. The already-lent nodes are returned by U8's staged
#      node-drain reclaim waves (schedule.yaml reclaimWaves), each honoring the
#      120 s checkpoint grace (KTD12) so worst-case lost work is one interval. No
#      inference pod is involved.
#   2. Emergency — if demand outruns the curve, pending inference pods
#      (PriorityClass inference-critical) preempt training node-level via
#      kube-scheduler. Also no Kueue involvement.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: training-borrow
spec:
  cohort: gpu-lending
  namespaceSelector: {}
  preemption:
    # Let the cohort reclaim borrowed capacity, and let higher-priority training
    # preempt lower-priority training within the queue. Priority among training
    # is set by workload priority; inference never appears here.
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    # cpu/memory are covered but not lending-managed: Kueue refuses to admit a
    # workload whose pod requests any resource the ClusterQueue does not cover
    # ("resource cpu unavailable in ClusterQueue"), so generous nominal quotas
    # keep nvidia.com/gpu the only constraining resource. Caught live by the
    # integration tier: without these, no training job ever admits.
    # (resources[] order must mirror coveredResources[] order — Kueue webhook
    # enforces it.)
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-lendable
          resources:
            - name: cpu
              nominalQuota: "512"
            - name: memory
              nominalQuota: 2Ti
            - name: nvidia.com/gpu
              # Training owns nothing outright.
              nominalQuota: 0
              # The lending curve. This value is reconciled from
              # clusters/pilot/lending/schedule.yaml by the U8 controller: it is
              # the current lendable headroom inference is willing to release.
              # Placeholder 64 (full pool) — the controller drives it down to 0
              # across staged steps ahead of the ramp. Kueue admits training only
              # while the curve has headroom; shrinking it stops *new* admission,
              # while U8's staged reclaim waves drain the training already running
              # on lent nodes (running work is not Kueue-preempted here).
              borrowingLimit: 64
