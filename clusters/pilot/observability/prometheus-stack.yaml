# Evidence-plane data source (U9). Two ArgoCD Applications: kube-prometheus-stack
# (Prometheus + Alertmanager + Grafana, the metric store the read-API is built
# on) and the NVIDIA DCGM exporter (per-GPU kernel utilization and health, which
# the stack does not bundle). Both are region-local in the pilot cluster so the
# evidence plane keeps recording through a hub outage.
#
# Skeleton values only — pinned chart digests, retention sizing, and remote-write
# are set per-overlay in a follow-up. The load-bearing bits here are: scrape the
# DCGM exporter, and let the PrometheusRule / ServiceMonitor CRs in this directory
# be discovered (ruleSelector/serviceMonitorSelector left open).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pilot-kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
  # Let the store come up before rules/exporters that depend on the CRDs.
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # targetRevision pinned to a digest in a follow-up (scaffold: track a chart
    # minor here, not floating latest).
    targetRevision: "65.x"
    helm:
      values: |
        # --- Prometheus ---------------------------------------------------
        prometheus:
          prometheusSpec:
            retention: 30d
            # Discover every PrometheusRule/ServiceMonitor in the cluster,
            # including recording-rules.yaml in this directory. Open selectors
            # so the git-managed rule CRs are picked up without per-rule wiring.
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            # Scrape the DCGM exporter (separate Application below) for GPU
            # kernel-util and health series (Assumption 2's revisit trigger).
            additionalScrapeConfigs:
              - job_name: dcgm-exporter
                kubernetes_sd_configs:
                  - role: endpoints
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_label_app]
                    regex: dcgm-exporter
                    action: keep
        # --- Grafana: dashboards are secondary; agents read slo-definitions.yaml,
        #     not dashboards (U9). Kept minimal.
        grafana:
          enabled: true
          defaultDashboardsEnabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # kube-prometheus-stack CRDs are large
---
# NVIDIA DCGM exporter — per-GPU kernel utilization and health (XID/ECC), the
# signal that separates allocation-idle from kernel-idle (Assumption 2) and feeds
# the quarantine runbook (U8). Runs as a DaemonSet on GPU nodes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pilot-dcgm-exporter
  namespace: argocd
  labels:
    app.kubernetes.io/name: dcgm-exporter
  annotations:
    # After the stack so the ServiceMonitor CRD exists.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
    chart: dcgm-exporter
    targetRevision: "3.x"
    helm:
      values: |
        # Only GPU nodes (both warm-floor and lendable pools carry GPUs).
        nodeSelector:
          nvidia.com/gpu.present: "true"
        # Tolerate every GPU pool taint so the exporter lands on floor, lendable,
        # lent, and quarantined nodes alike (health must be observed everywhere).
        tolerations:
          - key: pool.synorg.io/warm-floor
            operator: Exists
            effect: NoSchedule
          - key: pool.synorg.io/lendable
            operator: Exists
            effect: NoSchedule
          - key: lending.synorg.io/lent
            operator: Exists
            effect: NoSchedule
          - key: gpu.synorg.io/quarantine
            operator: Exists
            effect: NoSchedule
        # Emit the ServiceMonitor the stack discovers (label app=dcgm-exporter
        # matches the additionalScrapeConfigs relabel above).
        serviceMonitor:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
