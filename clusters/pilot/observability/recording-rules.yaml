# Evidence-plane recording rules (U9). Precompute the series the read-API and the
# success-criteria queries depend on so agents and game-day checks read stable
# metric names, not ad-hoc PromQL. Grouped by concern; every rule carries its
# source. Rendered as a PrometheusRule CRD (discovered by the kube-prometheus
# stack). The `.spec.groups` body is a plain Prometheus rules document and is
# promtool-checkable by extracting it (see the directory's verification notes).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: evidence-plane
  namespace: observability
  labels:
    app.kubernetes.io/name: evidence-plane
    app.kubernetes.io/component: recording-rules
spec:
  groups:
    # -- Render-start latency (Success Criterion 1) -------------------------
    # Source: render_start_seconds histogram emitted by the inference service
    # (R1 render path). The reclaim-window-scoped variant isolates the morning
    # storm so the SLO can be proven precisely when it is under threat.
    - name: render-latency
      interval: 30s
      rules:
        - record: render_start_seconds:p95
          expr: histogram_quantile(0.95, sum by (region, le) (rate(render_start_seconds_bucket[5m])))
        # 1 while any node carries the lent taint — i.e. lent capacity exists
        # and a reclaim can be in flight. Derived from kube-state-metrics
        # (already scraped); the lending controller emits Events, not metrics,
        # so KSM's view of its taints is the flag's source of truth.
        - record: lending_reclaim_window_active
          expr: clamp_max(count(kube_node_spec_taint{key="lending.synorg.io/lent"}) or vector(0), 1)
        # Same p95, gated to the reclaim window via the flag above. on() =
        # match the single flag series against every region.
        - record: render_start_seconds:p95:reclaim_window
          expr: render_start_seconds:p95 and on() (lending_reclaim_window_active == 1)

    # -- GPU utilization: allocation-idle vs kernel-idle (Assumption 2) ------
    # Source: DCGM exporter (kernel work) and kube-state-metrics (allocation).
    # Keeping the two separate is exactly the revisit trigger for Assumption 2:
    # high allocation with low kernel util means lending is not the fix.
    - name: gpu-utilization
      interval: 30s
      rules:
        # Real kernel work: graphics/compute engine active fraction (0..1).
        - record: gpu_kernel_util:ratio
          expr: avg by (node) (DCGM_FI_PROF_GR_ENGINE_ACTIVE)
        # Allocation idle: 1 - (GPUs requested / GPUs allocatable) per node.
        - record: gpu_allocation_idle:ratio
          expr: |
            1 - (
              sum by (node) (kube_pod_container_resource_requests{resource="nvidia_com_gpu"})
              /
              sum by (node) (kube_node_status_allocatable{resource="nvidia_com_gpu"})
            )

    # -- Per-team GPU-hour attribution (R6, Success Criterion) --------------
    # Source: join pod GPU requests to the team.synorg.io/name label (enforced by
    # U5 — unlabeled GPU pods are denied, so there is no unattributed remainder)
    # and to node lifecycle (lent nodes attribute their training borrow to the
    # borrowing team). This gauge is allocated-GPUs-per-team; the catalog query
    # integrates it over the window to get GPU-hours.
    - name: gpu-attribution
      interval: 30s
      rules:
        - record: team:gpu_allocated:sum
          expr: |
            sum by (team) (
              kube_pod_container_resource_requests{resource="nvidia_com_gpu"}
              * on (pod, namespace) group_left(team)
              label_replace(kube_pod_labels, "team", "$1", "label_team_synorg_io_name", "(.+)")
            )

    # -- Scarcity: asked vs got (R8, KTD5 "scarcity is evidence") -----------
    # Source: Karpenter provisioning events shaped into rates. asked = capacity
    # Karpenter tried to create; got = capacity that registered Ready. The unmet
    # ratio is the scarcity signal the fleet-shaping loop consumes — a data point,
    # never an error.
    - name: capacity-scarcity
      interval: 1m
      rules:
        - record: capacity_asked:rate5m
          expr: sum by (nodepool) (rate(karpenter_nodeclaims_created_total[5m]))
        - record: capacity_got:rate5m
          expr: sum by (nodepool) (rate(karpenter_nodeclaims_registered_total[5m]))
        - record: capacity_unmet:ratio
          # Divide only where asked>0: `> 0` filters the denominator so nodepools
          # that asked for nothing drop out entirely, rather than clamp_min
          # fabricating a 1-ask floor that reads as "asked 1, got 0 → 100% unmet".
          expr: |
            1 - (
              capacity_got:rate5m
              / (capacity_asked:rate5m > 0)
            )

    # -- Return-to-service stage decomposition (U3, R5) ---------------------
    # RTS = drain-start → rejoined-and-serving, decomposed by stage so pass 2's
    # governor has per-stage tuning data instead of one opaque number. The
    # controller owns the DRAIN stage and emits it as `action=stage_drain_*`
    # structured logs (controllers/lending/reconcile.sh); bridging those logs to
    # a Prometheus series lands with the controller metrics endpoint (deferred).
    # The post-termination stages are derived here from Karpenter NodeClaim
    # lifecycle histograms. The ATTEST stage (R13) is DECLARED so RTS carries it
    # as ABSENT — not zero — until attestation is built: it references a
    # lending_attest_duration_seconds series nothing emits yet, so it resolves to
    # absent, and a zero would silently understate RTS once attest joins the
    # return path (KTD4). Correct magnitudes are validated when the pilot runs;
    # pass 1 only stands the series up (instrument before tuning).
    - name: rts-return-to-service
      interval: 1m
      rules:
        # reimage: instance launch→registration — the scrub-and-reimage span.
        - record: rts_reimage_seconds:p95
          expr: histogram_quantile(0.95, sum by (nodepool, le) (rate(karpenter_nodeclaims_registration_duration_seconds_bucket[1h])))
        # orchestration-to-serving: launch→Ready — the rejoin span.
        - record: rts_orchestration_seconds:p95
          expr: histogram_quantile(0.95, sum by (nodepool, le) (rate(karpenter_nodeclaims_launch_duration_seconds_bucket[1h])))
        # attest: declared, absent until R13 emits lending_attest_duration_seconds.
        - record: rts_attest_seconds:p95
          expr: histogram_quantile(0.95, sum by (nodepool, le) (rate(lending_attest_duration_seconds_bucket[1h])))
        # Observable-so-far upper bound: the post-termination stages Karpenter
        # exposes today. `or vector(0)` keeps a missing stage from nulling the
        # sum; the drain and attest stages fold in once their series exist. This
        # is an upper bound (sum of per-stage p95s), not a true end-to-end p95 —
        # the real p95 needs the drain-stage bridge (pass 2).
        - record: rts_observable_seconds:sum_p95
          expr: |
            (rts_reimage_seconds:p95 or vector(0))
            + (rts_orchestration_seconds:p95 or vector(0))

    # -- Borrower demand + held-capacity utilization (U6, R28, R2) ----------
    # The signals R2's curve-vs-leases graduation trigger needs, and the
    # keep-or-shrink decision on the held book. Dimensioned by `cluster_queue`
    # (the Kueue borrower class), so a second borrower — batch-inference-borrow
    # (ADR 0009) — registers as another series with NO rule rewrite. Source:
    # Kueue queue metrics (already scraped), same family as reclaimed_hours_served
    # below. Magnitudes are validated when the pilot runs; pass 1 stands up the
    # series (instrument before tuning).
    - name: borrower-demand
      interval: 1m
      rules:
        # Borrowed GPUs per borrower class (integrate over the window → GPU-hours).
        - record: borrower:gpu_borrowed:sum
          expr: sum by (cluster_queue) (kueue_cluster_queue_resource_usage{resource="nvidia_com_gpu"})
        # Admission wait p95 per borrower class — the contention signal. Rising
        # wait under a filled curve is what argues for lease objects (R2).
        - record: borrower:admission_wait_seconds:p95
          expr: histogram_quantile(0.95, sum by (cluster_queue, le) (rate(kueue_quota_reserved_wait_time_seconds_bucket[1h])))
        # Held GPU capacity: allocatable on the never-descaled book (lendable +
        # warm-floor). `and on(node)` filters allocatable to held-pool nodes.
        - record: held:gpu_capacity:sum
          expr: |
            sum(
              kube_node_status_allocatable{resource="nvidia_com_gpu"}
              and on (node)
              kube_node_labels{label_karpenter_sh_nodepool=~"gpu-lendable|gpu-warm-floor"}
            )
        # Lendable-window utilization of HELD capacity — borrowed / held, NOT
        # borrowed / lendable. The denominator is the whole standing book so the
        # ratio answers "how much of what we pay to hold is being second-tenanted".
        - record: held:lendable_utilization:ratio
          expr: |
            sum(kueue_cluster_queue_resource_usage{resource="nvidia_com_gpu"})
            / (held:gpu_capacity:sum > 0)

    # -- Success Criterion 3: $/GPU-hour and reclaimed-hours-served ---------
    # Source: billing-derived hourly cost gauge joined to region; Kueue borrow
    # usage on the training-borrow queue (GPUs served on reclaimed night capacity;
    # integrated over the window in the catalog to get reclaimed hours served).
    - name: criterion3-cost
      interval: 1m
      rules:
        - record: gpu_hour_cost:usd
          expr: sum by (region) (synorg_gpu_instance_hourly_usd)
        - record: reclaimed_hours_served:gpus
          expr: sum(kueue_cluster_queue_resource_usage{cluster_queue="training-borrow", resource="nvidia_com_gpu"})

    # -- Success Criterion 5: PR-to-converged and auto-approval share -------
    # Source: a CI+ArgoCD bridge that stitches PR-open→merge (CI) with sync→Healthy
    # (ArgoCD sync events) into one histogram; CI merge events labeled by lane
    # (auto = auto-approved lane, exception = human-by-exception).
    - name: criterion5-flow
      interval: 1m
      rules:
        - record: pr_to_converged_seconds:p95
          expr: histogram_quantile(0.95, sum by (le) (rate(pr_to_converged_seconds_bucket[1d])))
        - record: auto_approved:ratio
          # `> 0` filters the denominator: with no merges in the window the ratio
          # is absent (honestly "no data"), not clamp_min's 0/1 = 0% that looks
          # like a real auto-approval collapse.
          expr: |
            sum(rate(ci_pr_merged_total{lane="auto"}[1d]))
            / (sum(rate(ci_pr_merged_total[1d])) > 0)
