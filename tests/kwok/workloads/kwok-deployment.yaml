# kwok-deployment.yaml — demand generator for the kwok/Karpenter lifecycle
# suite (tests/kwok/karpenter_test.sh). Runs ONLY against the isolated kwok
# cluster (tests/kind/kwok-up.sh): it tolerates the karpenter.kwok.sh/virtual
# template taint and pins itself to the kwok-test NodePool, so the only real
# node there (the control-plane) can never host it. CPU-only request: kwok
# nodes never advertise nvidia.com/gpu. Pods bound to virtual nodes never
# actually run (no kubelet); the suite asserts provisioning/binding, not
# execution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-probe
  namespace: kwok-test
  labels:
    synorg.io/kwok-test: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kwok-probe
  template:
    metadata:
      labels:
        app: kwok-probe
        synorg.io/kwok-test: "true"
    spec:
      nodeSelector:
        karpenter.sh/nodepool: kwok-test
      tolerations:
        - key: karpenter.kwok.sh/virtual
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 0
      containers:
        - name: probe
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "1"
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 64Mi
