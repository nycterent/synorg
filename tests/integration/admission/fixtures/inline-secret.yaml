# DENY fixture (S6a): a Secret carrying inline material in a team namespace,
# without the external-secrets.io/managed label. deny-inline-secrets (R13)
# must reject it at real admission — secret material never lives in
# git-applied manifests; ESO projects it from the central manager.
# Namespace is injected by admission_test.sh via `kubectl -n`.
apiVersion: v1
kind: Secret
metadata:
  name: adm-inline-secret
type: Opaque
stringData:
  api-key: "committed-to-git-by-mistake"
