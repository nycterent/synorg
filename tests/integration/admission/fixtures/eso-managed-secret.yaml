# ADMIT fixture (S6b): the same shape of Secret, but carrying the
# external-secrets.io/managed=true label that ESO stamps on Secrets it owns.
# deny-inline-secrets must let it through — ESO-projected Secrets are the one
# legitimate way secret material appears in a team namespace (R13).
# Namespace is injected by admission_test.sh via `kubectl -n`.
apiVersion: v1
kind: Secret
metadata:
  name: adm-eso-managed-secret
  labels:
    external-secrets.io/managed: "true"
type: Opaque
data:
  api-key: cHJvamVjdGVkLWJ5LWVzbw==
