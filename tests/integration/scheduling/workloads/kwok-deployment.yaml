# kwok-deployment.yaml — demand generator for the kwok/Karpenter scenarios
# (U3, s6 / KTD3). The ONLY workload in this suite that tolerates the
# karpenter.kwok.sh/virtual template taint, and it pins itself to the
# kwok-test NodePool — so it can never consume real-worker capacity, and no
# GPU workload can follow it onto virtual nodes. CPU-only request: kwok nodes
# never advertise nvidia.com/gpu. Pods bound there never actually run (no
# kubelet); s6 asserts provisioning/binding, not execution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-probe
  namespace: scheduling-test
  labels:
    synorg.io/scheduling-test: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kwok-probe
  template:
    metadata:
      labels:
        app: kwok-probe
        synorg.io/scheduling-test: "true"
    spec:
      nodeSelector:
        karpenter.sh/nodepool: kwok-test
      tolerations:
        - key: karpenter.kwok.sh/virtual
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 0
      containers:
        - name: probe
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "1"
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 64Mi
