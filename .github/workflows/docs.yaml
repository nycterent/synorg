name: docs
on:
  push:
    branches: [main]
    paths: [docs/**, runbooks/**, mkdocs.yml, .github/workflows/docs.yaml]
  pull_request:
    paths: [docs/**, runbooks/**, mkdocs.yml]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict   # strict fails on broken links / nav
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: site

  deploy:
    # Publish to GitHub Pages only on push to main.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
