name: integration
# The integration tier (plan 002 U8): the same `make integration` an engineer
# runs locally — the main kind + fake-GPU harness phase, then the isolated
# kwok/Karpenter cluster phase (tests/kind/kwok-up.sh). Docker, jq, yq and go
# are preinstalled on ubuntu runners; kind/kubectl/helm are pinned below.
on:
  pull_request:
    paths:
      - charts/**
      - policies/**
      - clusters/**
      - tests/**
      - controllers/**
      - Makefile
      - .github/workflows/integration.yaml
  push:
    branches: [main]
    paths:
      - charts/**
      - policies/**
      - clusters/**
      - tests/**
      - controllers/**
      - Makefile
      - .github/workflows/integration.yaml

env:
  # kind v0.30.x is the release line for the kindest/node v1.33.7 image
  # pinned in tests/kind/cluster.yaml (see tests/kind/README.md pin table).
  KIND_VERSION: v0.30.0
  # kubectl matches the harness k8s version (kindest/node v1.33.7).
  KUBECTL_VERSION: v1.33.7
  # Same Helm pin as .github/workflows/validate.yaml.
  HELM_VERSION: v4.1.1

jobs:
  integration:
    runs-on: ubuntu-latest
    # 45 for the main phase + 15 for the kwok phase (karpenter clone + ko
    # build from source, then the provisioning/consolidation/drift suite).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchain
        id: toolcache
        uses: actions/cache@v4
        with:
          path: ~/bin
          key: integration-tools-${{ env.KIND_VERSION }}-${{ env.KUBECTL_VERSION }}-${{ env.HELM_VERSION }}
      - name: Install toolchain (cache miss)
        if: steps.toolcache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -fsSL -o ~/bin/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          curl -fsSL -o ~/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" | tar -xz --strip-components=1 -C ~/bin linux-amd64/helm
          chmod +x ~/bin/kind ~/bin/kubectl
      - name: Add toolchain to PATH
        run: echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Integration (same target as local)
        # Both phases run: the main harness (Kyverno/Kueue/fake-GPU, NO
        # Karpenter) and the isolated kwok/Karpenter cluster, where the kwok
        # provider is built from a pinned source checkout with go+ko.
        # go: no install step needed — karpenter v1.14.0's go.mod pins
        # `go 1.26.5`, and the runner's preinstalled go (>=1.21) auto-fetches
        # exactly that toolchain via the default GOTOOLCHAIN=auto, so the
        # build is pinned by go.mod itself, not by the runner image.
        run: make integration
      - name: Export kind logs (failure)
        # make integration leaves the failing cluster up by design, so the
        # control-plane and node logs are still there to collect (whichever
        # phase failed; the other cluster export is a no-op).
        if: failure()
        run: |
          kind export logs /tmp/kind-logs --name synorg || true
          kind export logs /tmp/kind-logs-kwok --name synorg-kwok || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: kind-logs
          path: |
            /tmp/kind-logs
            /tmp/kind-logs-kwok
          if-no-files-found: ignore
