site_name: synorg platform
# file-style URLs (page.html, not page/) so the built site works over file://
# — these docs are read locally from site/; flip back if we ever host them.
use_directory_urls: false
site_description: Multi-region GPU compute platform on EKS — docs organised by Diátaxis.
docs_dir: docs
site_dir: site

# runbooks/ (the how-to quadrant) lives at the repo root and is pulled into the
# build via the docs/runbooks symlink; MkDocs follows it. Everything the site
# needs therefore sits under docs/.
exclude_docs: |
  plans/
  residual-review-findings/
  TODO-docs.md

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle: {icon: material/brightness-7, name: Switch to dark mode}
    - scheme: slate
      primary: teal
      toggle: {icon: material/brightness-4, name: Switch to light mode}
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list        # required (with md_in_html) for the landing page's grid cards
  - md_in_html       # markdown inside <div class="grid cards" markdown> blocks
  - pymdownx.superfences
  - pymdownx.details
  - toc: {permalink: true}

# The nav IS the Diátaxis map: four modes, each serving one reader need.
# Learning → Tutorials · a task → How-to · a fact → Reference · why → Explanation.
nav:
  - Home: index.md
  - Tutorials:
      - Validate on your laptop: tutorials/first-validation.md
  - How-to (runbooks):
      - Deploy the platform from zero: runbooks/deploy-platform.md
      - Operate & maintain: runbooks/operations.md
      - Migrate a service: runbooks/service-migration.md
      - Onboard a training job: runbooks/training-onboarding.md
      - Scrub a node: runbooks/node-scrub.md
      - Quarantine a GPU node: runbooks/gpu-node-quarantine.md
      - Capture & carve held capacity: runbooks/capacity-carve.md
      - Run a game-day: runbooks/game-day.md
      - Run the real-GPU e2e: runbooks/e2e-gpu-run.md
  - Reference:
      - Conventions: conventions.md
      - Glossary: glossary.md
      - "ADR 0001: multi-region is arbitrage": adr/0001-multi-region-is-availability-arbitrage.md
      - Capability tiers: capability-tiers.md
      - Agent interface: agent-interface.md
      - SLO catalog: slo-catalog.md
      - Region set: region-set.md
      - Capacity transition ledger: capacity-transition.md
      - env-spec retirement: env-spec-retirement.md
      - ECS retirement: ecs-retirement.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - Why the platform lends GPUs: explanation/why-lending.md
      - The test ladder: explanation/testing.md
      - "Learning: kernel-idle vs allocation-idle": solutions/2026-07-17-kernel-idle-vs-allocation-idle.md

extra_css:
  - assets/extra.css
  # Tufte-style layer for Explanation pages only — every rule is scoped to
  # pages whose H1 carries { .tufte }; all other pages are unaffected.
  - stylesheets/tufte-explanation.css
