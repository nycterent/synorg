apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-inline-secrets
  annotations:
    policies.kyverno.io/title: Deny inline secret material in app namespaces
    policies.kyverno.io/category: secrets
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      "Never" tier (R13): secret material never lives in git-applied manifests.
      Secrets in team namespaces must be projected by External Secrets Operator
      from the central manager. A Secret carrying inline data/stringData is denied
      unless it is ESO-managed (label external-secrets.io/managed=true, which ESO
      stamps on the Secrets it owns).
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: no-inline-secret-data
      match:
        any:
          - resources:
              kinds:
                - Secret
      # Scope to team/app namespaces; platform + system namespaces legitimately
      # hold operator-managed secret material and are out of scope here.
      preconditions:
        all:
          - key: "{{ request.namespace }}"
            operator: AnyIn
            value:
              - "team-*"
      validate:
        message: >-
          Secret {{ request.object.metadata.name }} in {{ request.namespace }}
          carries inline secret material. Team-namespace secrets must be projected
          by External Secrets Operator, not committed to git (R13). Replace with an
          ExternalSecret referencing the central manager, or (for ESO-owned
          Secrets) the external-secrets.io/managed=true label is required.
        deny:
          # Denied only when the Secret is NOT ESO-managed AND carries material —
          # ESO-projected Secrets (carrying the managed label) are allowed through.
          conditions:
            all:
              - key: "{{ request.object.metadata.labels.\"external-secrets.io/managed\" || '' }}"
                operator: NotEquals
                value: "true"
              - key: "{{ length(merge(request.object.data || `{}`, request.object.stringData || `{}`)) }}"
                operator: GreaterThan
                value: 0
