apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod-no-team
  namespace: team-alpha
spec:
  containers:
    - name: trainer
      image: nvcr.io/example/trainer:1.0
      resources:
        limits:
          nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod-with-team
  namespace: team-alpha
  labels:
    team.synorg.io/name: alpha
spec:
  containers:
    - name: trainer
      image: nvcr.io/example/trainer:1.0
      resources:
        limits:
          nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Pod
metadata:
  name: cpu-pod-no-team
  namespace: team-alpha
spec:
  containers:
    - name: web
      image: nginx:1.27
      resources:
        limits:
          cpu: "500m"
