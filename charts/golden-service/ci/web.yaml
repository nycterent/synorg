# CI fixture: a plain web service (no GPU, cluster-default priority).
team: payments
workloadClass: web
replicas: 3
port: 8080
image:
  repository: ghcr.io/nycterent/synorg/payments/web
  tag: "1.4.2"
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 2
rbac:
  create: true
