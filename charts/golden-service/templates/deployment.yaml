apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "golden-service.fullname" . }}
  labels:
    {{- include "golden-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "golden-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "golden-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "golden-service.serviceAccountName" . }}
      {{- if eq .Values.workloadClass "inference" }}
      # Render path: customer inference preempts training node-level via
      # PriorityClass (conventions.md). Web keeps the cluster default.
      priorityClassName: inference-critical
      {{- end }}
      {{- if and (eq .Values.workloadClass "inference") (gt (int .Values.gpu) 0) }}
      # GPU inference may land on either GPU pool, but prefers the never-lent
      # warm floor so the render path holds its latency floor (R2). Tolerating
      # both taints lets pods spill onto lendable capacity under pressure.
      tolerations:
        - key: pool.synorg.io/warm-floor
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: pool.synorg.io/lendable
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: In
                    values:
                      - gpu-warm-floor
      {{- end }}
      containers:
        - name: {{ include "golden-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              {{- if gt (int .Values.gpu) 0 }}
              nvidia.com/gpu: {{ .Values.gpu }}
              {{- end }}
