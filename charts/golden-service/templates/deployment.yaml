apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "golden-service.fullname" . }}
  labels:
    {{- include "golden-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  # HPA owns the replica count when enabled; emitting replicas here would fight
  # the autoscaler (it would reset desired replicas on every sync).
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "golden-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "golden-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "golden-service.serviceAccountName" . }}
      {{- if eq .Values.workloadClass "inference" }}
      # Render path: customer inference preempts training node-level via
      # PriorityClass (conventions.md). Web keeps the cluster default.
      priorityClassName: inference-critical
      {{- end }}
      {{- if and (eq .Values.workloadClass "inference") (gt (int .Values.gpu) 0) }}
      # GPU inference always tolerates the never-lent warm floor and prefers it
      # so the render path holds its latency floor (R2). Non-customer-data
      # inference may ALSO tolerate the lendable pool to spill under pressure;
      # customer-data inference may NOT — a lent node can be reclaimed and
      # scrubbed for R&D, so tenancy-guard denies customer-data pods that
      # tolerate lendable (R9 co-tenancy isolation). Gate the lendable toleration
      # on NOT customerData to stay on the allowed side of that policy.
      tolerations:
        - key: pool.synorg.io/warm-floor
          operator: Equal
          value: "true"
          effect: NoSchedule
        {{- if not .Values.customerData }}
        - key: pool.synorg.io/lendable
          operator: Equal
          value: "true"
          effect: NoSchedule
        {{- end }}
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: In
                    values:
                      - gpu-warm-floor
      {{- end }}
      containers:
        - name: {{ include "golden-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              {{- if gt (int .Values.gpu) 0 }}
              nvidia.com/gpu: {{ .Values.gpu }}
              {{- end }}
